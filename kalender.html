<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender — De Saloncoureurs</title>
    <link rel="stylesheet" href="stijl.css">
    <style>
        /* Specifieke stijlen voor de kalender */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-top: 15px;
        }
        .calendar-day-head {
            font-weight: bold;
            text-align: center;
            padding: 5px;
            font-size: 0.75rem;
            color: var(--text3);
            text-transform: uppercase;
        }
        .calendar-day {
            min-height: 80px; /* Iets hoger gemaakt voor tekstruimte */
            aspect-ratio: 1 / 1;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
            background: var(--surface);
            overflow: hidden;
        }
        .calendar-day.today {
            border: 2px solid var(--blue-fg);
            background: var(--blue-bg);
        }
        .day-number {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        /* De tekst van de rit zelf */
        .event-label {
            font-size: 9px;
            line-height: 1.1;
            padding: 2px 4px;
            border-radius: 3px;
            background: var(--surface2);
            color: var(--text);
            margin-top: 2px;
            word-wrap: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Verschillende kleuren per type rit */
        .event-sunday { background: var(--teal-bg); color: var(--teal-fg); border-left: 2px solid var(--teal-fg); }
        .event-special { background: var(--amber-bg); color: var(--amber-fg); border-left: 2px solid var(--amber-fg); }
        .event-weekend { background: var(--purple-bg); color: var(--purple-fg); border-left: 2px solid var(--purple-fg); }

        .calendar-day.today::after {
            content: 'VANDAAG';
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 7px;
            color: var(--blue-fg);
            font-weight: 900;
        }

        .month-display {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            color: var(--navy3);
            text-transform: capitalize;
        }
    </style>
</head>
<body>

<nav class="topnav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="logo.png" style="width:28px;height:28px;object-fit:contain;">
      De Saloncoureurs
    </a>
    <div class="nav-links">
      <a href="index.html">Homepage</a>
      <a href="kalender.html" class="active">Kalender</a>
      <a href="leden.html">Leden</a>
      <a href="statuten.html">Statuten</a>
      <a href="galerij.html">Galerij</a>
    </div>
    <button class="nav-burger" onclick="toggleMenu()">☰</button>
  </div>
</nav>

<div class="page">
  <header class="site-header">
    <div class="logo" style="background:var(--navy3);padding:4px;">
      <img src="logo.png" style="width:44px;height:44px;object-fit:contain;">
    </div>
    <div class="header-title">
      <h1>De Saloncoureurs</h1>
      <p>Kalender 2026</p>
    </div>
  </header>

  <div class="grid">
    <div class="card full">
      <div class="card-title"><div class="dot dot-blue"></div> Interactieve Agenda</div>
      <div id="calendar-title" class="month-display"></div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <div class="card full">
      <div class="card-title"><div class="dot dot-purple"></div> Volledig Overzicht 2026</div>
      <div class="event-list" id="event-list"></div>
    </div>
  </div>

  <footer class="site-footer">De Saloncoureurs &copy; 2026</footer>
</div>

<script>
function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}

// Data van de speciale evenementen
const events2026 = [
    { date: '2026-03-27', title: 'Fietsweekend Leisele', type: 'weekend' },
    { date: '2026-03-28', title: 'Fietsweekend Leisele', type: 'weekend' },
    { date: '2026-03-29', title: 'Fietsweekend Leisele', type: 'weekend' },
    { date: '2026-05-31', title: 'Rikolto rit - goede doel', type: 'special' },
    { date: '2026-06-14', title: 'Vaderdagrit / Bardosrit', type: 'special' },
    { date: '2026-06-21', title: 'Triathlon Kortrijk', type: 'special' }
];

function generateCalendar() {
    const now = new Date();
    const currentMonth = now.getMonth();
    const currentYear = now.getFullYear();
    const todayDate = now.getDate();

    const monthNames = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];
    document.getElementById('calendar-title').innerText = `${monthNames[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    
    // Maandag als eerste dag van de week (0=Ma, 6=Zo)
    let startOffset = firstDay === 0 ? 6 : firstDay - 1;

    const grid = document.getElementById('calendar-grid');
    const dayLabels = ['Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za', 'Zo'];
    
    dayLabels.forEach(label => {
        const div = document.createElement('div');
        div.className = 'calendar-day-head';
        div.innerText = label;
        grid.appendChild(div);
    });

    for (let i = 0; i < startOffset; i++) {
        grid.appendChild(document.createElement('div'));
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const dateObj = new Date(currentYear, currentMonth, day);
        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';
        if (day === todayDate && currentMonth === new Date().getMonth()) dayDiv.classList.add('today');

        dayDiv.innerHTML = `<span class="day-number">${day}</span>`;

        // Logica voor rittitels op de kalender
        let eventTitle = "";
        let eventClass = "";

        // 1. Check voor speciale events (deze overschrijven de zondagsrit)
        const specificEvent = events2026.find(e => e.date === dateStr);
        if (specificEvent) {
            eventTitle = specificEvent.title;
            eventClass = `event-${specificEvent.type}`;
        } 
        // 2. Als het zondag is en er geen speciaal event is
        else if (dateObj.getDay() === 0) {
            eventTitle = "Zondagsrit";
            eventClass = "event-sunday";
        }

        if (eventTitle) {
            dayDiv.innerHTML += `<div class="event-label ${eventClass}">${eventTitle}</div>`;
        }

        grid.appendChild(dayDiv);
    }

    renderEventList();
}

function renderEventList() {
    const listContainer = document.getElementById('event-list');
    let allPlanned = [...events2026];
    
    // Voeg zondagsritten toe voor de lijst onderaan (Maart t/m Oktober)
    for (let m = 2; m <= 9; m++) {
        let daysInMonth = new Date(2026, m + 1, 0).getDate();
        for (let d = 1; d <= daysInMonth; d++) {
            let date = new Date(2026, m, d);
            if (date.getDay() === 0) {
                let dateStr = `2026-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                if (!allPlanned.some(e => e.date === dateStr)) {
                    allPlanned.push({ date: dateStr, title: 'Zondagsrit', type: 'sunday' });
                }
            }
        }
    }

    allPlanned.sort((a, b) => new Date(a.date) - new Date(b.date));

    allPlanned.forEach(ev => {
        const d = new Date(ev.date);
        const day = d.getDate();
        const month = d.toLocaleString('nl-BE', { month: 'short' });
        
        const item = document.createElement('div');
        item.className = 'event-item';
        item.innerHTML = `
            <div class="event-date"><div class="month">${month}</div><div class="day">${day}</div></div>
            <div class="event-info">
                <div class="ev-title">${ev.title}</div>
                <div class="ev-sub">Start om 09:00 aan het lokaal</div>
            </div>
        `;
        listContainer.appendChild(item);
    });
}

generateCalendar();
</script>

</body>
</html>
